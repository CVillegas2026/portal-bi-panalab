<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panalab — Portal</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f4f6f9;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      background: #003087;
      color: #fff;
      padding: 0 2rem;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: #fff;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-icon svg {
      width: 22px;
      height: 22px;
    }

    .logo-text {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .logo-text span {
      color: #7eb3ff;
    }

    nav {
      display: flex;
      gap: 1.5rem;
    }

    nav a {
      color: rgba(255,255,255,0.8);
      text-decoration: none;
      font-size: 14px;
      transition: color 0.2s;
    }

    nav a:hover { color: #fff; }

    /* ── Subheader ── */
    .subheader {
      background: #fff;
      border-bottom: 1px solid #dde3ed;
      padding: 10px 2rem;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #6b7280;
    }

    .subheader span { color: #003087; font-weight: 500; }

    /* ── Main ── */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 1.5rem 2rem;
      max-width: 1100px;
      width: 100%;
      margin: 0 auto;
    }

    .page-title {
      font-size: 18px;
      font-weight: 600;
      color: #1a2b4a;
      margin-bottom: 1rem;
    }

    /* ── iFrame wrapper ── */
    .iframe-card {
      background: #fff;
      border-radius: 10px;
      border: 1px solid #dde3ed;
      overflow: hidden;
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 600px;
    }

    .iframe-card iframe {
      width: 100%;
      flex: 1;
      border: none;
      min-height: 600px;
    }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 1rem;
      font-size: 12px;
      color: #9ca3af;
    }

    /* ── Loading overlay ── */
    .loading {
      position: absolute;
      inset: 0;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-size: 14px;
      color: #6b7280;
    }

    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid #dde3ed;
      border-top-color: #003087;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .iframe-wrapper {
      position: relative;
      flex: 1;
    }

    /* Mobile */
    @media (max-width: 600px) {
      nav { display: none; }
      main { padding: 1rem; }
      header { padding: 0 1rem; }
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">
      <div class="logo-icon">
        <!-- Ícono de laboratorio / átomo -->
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="12" cy="12" r="3" fill="#003087"/>
          <ellipse cx="12" cy="12" rx="10" ry="4" stroke="#003087" stroke-width="1.5" fill="none"/>
          <ellipse cx="12" cy="12" rx="10" ry="4" stroke="#003087" stroke-width="1.5" fill="none" transform="rotate(60 12 12)"/>
          <ellipse cx="12" cy="12" rx="10" ry="4" stroke="#003087" stroke-width="1.5" fill="none" transform="rotate(120 12 12)"/>
        </svg>
      </div>
      <div class="logo-text">Pana<span>lab</span></div>
    </div>
    <nav>
      <a href="#">Inicio</a>
      <a href="#">Servicios</a>
      <a href="#">Contacto</a>
    </nav>
  </header>

  <div class="subheader">
    🏠 Inicio &rsaquo; <span>Portal de Formularios</span>
  </div>

  <main>
    <p class="page-title">Portal interno</p>

    <div class="iframe-card">
      <div class="iframe-wrapper">
        <div class="loading" id="loading">
          <div class="spinner"></div>
          Cargando...
        </div>
        <iframe
          id="app-frame"
          src="https://script.google.com/a/macros/panalab.com/s/AKfycbzsjQHhjNpCFaf3zFd4FA6_xELIQjOpAaZVnB2oK1OYhdFqxdl9Xo7YnjZ7H4aKRQ7H0g/exec"
          title="Aplicación Panalab"
          allowfullscreen
          sandbox="allow-scripts allow-forms allow-same-origin allow-popups allow-popups-to-escape-sandbox"
          onload="document.getElementById('loading').style.display='none'"
        ></iframe>
      </div>
    </div>
  </main>

  <footer>
    &copy; 2025 Panalab · Todos los derechos reservados
  </footer>

</body>
</html>
